format = "[ ](bold blue) $username on $directory$git_branch$git_status$custom$package$c$golang$nodejs$python$rust$lua$nix_shell$cmd_duration$line_break$character"
palette = "tokyonight"

[palettes.tokyonight]
bg = "#1a1b26"
fg = "#c0caf5"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#ff9e64"
purple = "#bb9af7"
red = "#f7768e"
yellow = "#e0af68"
comment = "#565f89"

[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = " "
style = "bold orange"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[nix_shell]
symbol = " "
style = "bold cyan"
format = "via [$symbol ($state)]($style) "

[cmd_duration]
style = "bold yellow"
format = "took [$duration]($style) "

[custom.jujutsu]
command = "jj log -r @ -n 1 --color never --template '\"󰘬 \" ++ change_id.short() ++ if(bookmarks, \" @ \" ++ bookmarks.join(\", \"))'"
when = "command -v jj >/dev/null && jj root --quiet"
style = "bold purple"
format = "on [$output]($style) "

[username]
show_always = true
style_user = "bold purple"
format = "[$user]($style)"

[package]
symbol = "󰏗 "
style = "bold comment"
format = "is [$symbol$version]($style) "

[rust]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "

[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol$version]($style) "

[c]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[lua]
symbol = " "
style = "bold purple"
format = "via [$symbol$version]($style) "

