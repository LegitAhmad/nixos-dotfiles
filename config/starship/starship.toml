format = """
[⸢](bold purple)[ ](bold blue)[⸥](bold purple) $username $directory$fill$cmd_duration $git_branch$python$nodejs$golang$rust$nix_shell
$character
"""

palette = "tokyonight"

[palettes.tokyonight]
fg      = "#c0caf5"
blue    = "#7aa2f7"
green   = "#9ece6a"
yellow  = "#e0af68"
orange  = "#ff9e64"
purple  = "#bb9af7"
red     = "#f7768e"
comment = "#565f89"

# Left side

[username]
show_always = true
style_user = "bold purple"
format = "[$user]($style) "

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
home_symbol = "~"
format = "($style)[$path]($style) "

# Git

[git_branch]
symbol = ""
style = "bold orange"
format = "on [$symbol $branch]($style)"

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style)) "

# Languages

[python]
symbol = " "
style = "yellow"
format = " via [$symbol$version]($style) "

[nodejs]
symbol = " "
style = "green"
format = " via [$symbol$version]($style) "

[golang]
symbol = " "
style = "cyan"
format = " via [$symbol$version]($style) "

[rust]
symbol = " "
style = "red"
format = " via [$symbol$version]($style) "

[nix_shell]
symbol = " "
style = "bold purple"
format = " via [$symbol]($style)"

# Prompt

[character]
success_symbol = "[ → :](bold green)"
error_symbol = "[ → :](bold red)"

[cmd_duration]
min_time = 2000
style = "yellow"
format = "[  $duration]($style)"

[fill]
symbol = " "
