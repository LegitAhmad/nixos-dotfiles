# --- Core Behavior Overrides ---
set -g detach-on-destroy off     # Don't exit tmux when closing a session
set -g escape-time 0             # Zero-out escape delay for snappy Vim switching
set -g history-limit 1000000     # Massive scrollback buffer
set -g renumber-windows on       # Keep window numbers sequential

# --- True Color Support ---
set -s default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:Tc"

# --- Status Bar Placement ---
set -g status-position top

# --- Prefix-less Pane Navigation (Alt + H/J/K/L) ---
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R

# --- Prefix-less Window Navigation (Alt + : / Alt + ") ---
bind -n 'M-:' previous-window
bind -n 'M-"' next-window

# --- Pane Resizing (Ctrl + Alt + H/J/K/L) ---
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# --- Intuitive Splitting and Window Creation ---
bind W new-window -c "#{pane_current_path}"
bind C-w new-window -a -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Fix mouse drag ending visual selection mode
unbind -T copy-mode-vi MouseDragEnd1Pane
