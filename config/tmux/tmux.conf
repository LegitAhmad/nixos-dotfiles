# ==========================================
# --- Core Settings & Prefix ---
# ==========================================
set -g mouse on
set -g base-index 1
setw -g mode-keys vi

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ==========================================
# --- Core Behavior Overrides ---
# ==========================================
set -g detach-on-destroy off     # Don't exit tmux when closing a session
set -g escape-time 0             # Zero-out escape delay for snappy Vim switching
set -g history-limit 100000      # Massive scrollback buffer
set -g renumber-windows on       # Keep window numbers sequential

# Modern True Color & Terminal configuration
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# ==========================================
# --- Navigation & Resizing (Prefix-less) ---
# ==========================================
# Pane Navigation
bind -n C-H select-pane -L
bind -n C-J select-pane -D
bind -n C-K select-pane -U
bind -n C-L select-pane -R

# Window Navigation
bind -n C-BTab previous-window
bind -n C-Tab next-window

# Pane Resizing (Ctrl + Alt + H/J/K/L)
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# ==========================================
# --- Splits and Window Creation ---
# ==========================================
bind W   new-window -c "#{pane_current_path}"
bind C-w new-window -a -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"
bind \\  split-window -h -c "#{pane_current_path}"

# Fix mouse drag ending visual selection mode
unbind -T copy-mode-vi MouseDragEnd1Pane

# ==========================================
# --- Catppuccin & Status Bar Polish ---
# ==========================================
# Configure Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰃭 %a %d %b "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰥔 %H:%M "

# Configure Tmux
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=default,fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format "  #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_text}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]│"

set -g window-status-current-format "  #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_surface_1},fg=#{@thm_peach},bold"


# ==========================================
# --- Sesh Configuration ---
# ==========================================
bind-key o run-shell "sesh connect \"$(
  sesh list | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

# ==========================================
# --- Plugins & Reload ---
# ==========================================
source-file ~/.config/tmux/plugins.conf

bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux Config Reloaded!"
